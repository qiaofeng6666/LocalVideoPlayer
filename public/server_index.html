<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎬 看片神器</title>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #1a0b2e 0%, #0d0618 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            user-select: none;
            overflow: hidden;
        }

        /* ===== 背景动态光晕 ===== */
        .glow-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 30% 40%, rgba(255, 70, 180, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 70% 60%, rgba(70, 130, 255, 0.12) 0%, transparent 60%),
                radial-gradient(circle at 50% 100%, rgba(255, 200, 50, 0.08) 0%, transparent 50%);
            animation: rotGlow 30s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rotGlow {
            0% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.05);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        /* ===== 主卡片 ===== */
        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 70px 70px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px) saturate(1.4);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 40px 80px rgba(0, 0, 0, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            max-width: 90vw;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 50px 100px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* ===== 标题 ===== */
        .title {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        /* ===== 按钮 ===== */
        .btn-watch {
            position: relative;
            display: inline-block;
            padding: 22px 70px;
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #ff2d75, #ff6b3d);
            border: none;
            border-radius: 80px;
            cursor: pointer;
            letter-spacing: 4px;
            transition: all 0.3s ease;
            box-shadow:
                0 0 30px rgba(255, 45, 117, 0.35),
                0 8px 32px rgba(0, 0, 0, 0.4);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .btn-watch::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }

        .btn-watch:hover {
            transform: scale(1.06);
            box-shadow:
                0 0 50px rgba(255, 45, 117, 0.5),
                0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .btn-watch:hover::before {
            opacity: 1;
        }

        .btn-watch:active {
            transform: scale(0.94);
            box-shadow: 0 0 20px rgba(255, 45, 117, 0.3);
        }

        /* ===== 按钮上的光晕扫过 ===== */
        .btn-watch::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-25deg);
            transition: left 0.8s ease;
        }

        .btn-watch:hover::after {
            left: 150%;
        }

        /* ===== 反馈区 ===== */
        .feedback {
            margin-top: 40px;
            min-height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .feedback-inner {
            font-size: 22px;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 32px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
        }

        .feedback-inner.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .feedback-inner .emoji {
            font-size: 36px;
            line-height: 1;
        }

        .feedback-inner .text {
            font-weight: 400;
        }

        .feedback-inner .highlight {
            color: #ff6b9d;
            font-weight: 600;
        }

        /* ===== 加载状态（点动画） ===== */
        .dots span {
            display: inline-block;
            animation: dotJump 1.2s ease-in-out infinite;
        }
        .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotJump {
            0%,
            80%,
            100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
        }

        /* ===== 星星粒子（装饰） ===== */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur, 4s) ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .card {
                padding: 40px 30px 50px;
                border-radius: 40px;
            }
            .title {
                font-size: 20px;
                letter-spacing: 4px;
            }
            .btn-watch {
                padding: 16px 40px;
                font-size: 24px;
            }
            .feedback-inner {
                font-size: 17px;
                padding: 10px 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .feedback-inner .emoji {
                font-size: 28px;
            }
        }

        @media (max-width: 400px) {
            .card {
                padding: 30px 16px 40px;
                border-radius: 30px;
            }
            .btn-watch {
                padding: 14px 28px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- 背景光晕 -->
    <div class="glow-bg"></div>

    <!-- 星星 -->
    <div class="stars" id="stars"></div>

    <!-- 主卡片 -->
    <div class="card">
        <div class="title">🎞️ 铤少看片神器</div>
        <div class="subtitle">— 此刻 · 即享 —</div>

        <button class="btn-watch" id="watchBtn">我要看片</button>

        <div class="feedback" id="feedback">
            <div class="feedback-inner" id="feedbackInner">
                <span class="emoji">🎬</span>
                <span class="text" id="feedbackText">正在为您加载…</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ===== 生成星星 =====
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--dur', (3 + Math.random() * 5) + 's');
                star.style.width = (1 + Math.random() * 3) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = (Math.random() * 5) + 's';
                starsContainer.appendChild(star);
            }

            // ===== DOM 引用 =====
            const btn = document.getElementById('watchBtn');
            const feedbackInner = document.getElementById('feedbackInner');
            const emojiEl = feedbackInner.querySelector('.emoji');
            const textEl = feedbackInner.querySelector('.text');

            // ===== 显示反馈（工具函数） =====
            function showFeedback(emoji, text) {
                emojiEl.textContent = emoji;
                textEl.innerHTML = text;
                feedbackInner.classList.add('show');
            }

            function hideFeedback() {
                feedbackInner.classList.remove('show');
            }

            // ===== 点击事件 =====
            btn.addEventListener('click', function() {
                // 显示加载状态
                showFeedback('⏳', '正在执行后台任务...');

                // 禁用按钮，防止重复点击
                const btn = this;
                btn.disabled = true;

                // 向后端发送请求
                fetch('/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showFeedback('🎬', '已找到 999+ 片子，尽情享受吧！');
                    } else {
                        showFeedback('😅', '点一次就够了，蠢货！');
                    }
                })
                .catch(err => {
                    showFeedback('😅', '发个微信告诉管理员吧！');
                })
                .finally(() => {
                    btn.disabled = false;
                });
            });

            // ===== 页面加载完成后显示欢迎信息 =====
            window.addEventListener('load', function() {
                setTimeout(() => {
                    showFeedback('👋', '点击上方按钮，即刻开启观影之旅');
                    // 8秒后自动隐藏欢迎信息
                    setTimeout(() => {
                        hideFeedback();
                    }, 8000);
                }, 200);
            });

        })();
    </script>
</body>
</html>
